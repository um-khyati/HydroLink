function buildGraph(){

  edges.forEach(([a,b,d])=>{g[a][b]=d;g[b][a]=d;});
  return g;

// Yen's K-shortest paths (simplified: Dijkstra with edge exclusions)
function dijkstra(graph,src,dst,forbidEdges=[]){
  const dist={},prev={},visited=new Set();
  places.forEach(p=>{dist[p.id]=Infinity;});
  dist[src]=0;
  const pq=[[0,src]];
  while(pq.length){
    pq.sort((a,b)=>a[0]-b[0]);
    const [d,u]=pq.shift();
    if(visited.has(u))continue;
    visited.add(u);
    if(u===dst)break;
    for(const [v,w] of Object.entries(graph[u])){
      const blocked=forbidEdges.some(e=>(e[0]===u&&e[1]===v)||(e[0]===v&&e[1]===u));
      if(!blocked&&dist[u]+w<dist[v]){dist[v]=dist[u]+w;prev[v]=u;pq.push([dist[v],v]);}
    }
  }
  const path=[];let cur=dst;
  while(cur){path.unshift(cur);cur=prev[cur];}
  if(path[0]!==src||dist[dst]===Infinity)return null;
  return {path,dist:dist[dst]};
}

function kShortestPaths(src,dst,k=3){
  const graph=buildGraph();
  const results=[];
  const r1=dijkstra(graph,src,dst);
  if(!r1)return results;
  results.push(r1);

  // For 2nd path: forbid the heaviest edge on the 1st path
  if(k>=2){
    const p=r1.path;
    let maxEdge=null,maxW=0;
    for(let i=0;i<p.length-1;i++){
      const e=edges.find(e=>(e[0]===p[i]&&e[1]===p[i+1])||(e[0]===p[i+1]&&e[1]===p[i]));
      if(e&&e[2]>maxW){maxW=e[2];maxEdge=[p[i],p[i+1]];}
    }
    if(maxEdge){
      const r2=dijkstra(graph,src,dst,[maxEdge]);
      if(r2&&!pathEqual(r2.path,r1.path))results.push(r2);
    }
  }

  // For 3rd path: forbid the first edge of path 1
  if(k>=3&&results.length>=2){
    const p1=r1.path;
    const forbid=[[p1[0],p1[1]],[p1[p1.length-2],p1[p1.length-1]]];
    const r3=dijkstra(graph,src,dst,forbid);
    if(r3&&!pathEqual(r3.path,results[0].path)&&!pathEqual(r3.path,results[1].path))results.push(r3);
    else{
      // try forbidding middle edge
      const mid=Math.floor(p1.length/2);
      const r3b=dijkstra(graph,src,dst,[[p1[mid-1],p1[mid]]]);
      if(r3b&&!pathEqual(r3b.path,results[0].path)&&(results.length<2||!pathEqual(r3b.path,results[1].path)))results.push(r3b);
    }
  }

  return results.slice(0,k);
}

    const path=r.path;
    for(let i=0;i<path.length-1;i++){
      const pa=placeById(path[i]),pb=placeById(path[i+1]);
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',pa.x);line.setAttribute('y1',pa.y);
      line.setAttribute('x2',pb.x);line.setAttribute('y2',pb.y);
      line.setAttribute('stroke',col);line.setAttribute('stroke-width',sw);
      if(dash!=='none')line.setAttribute('stroke-dasharray',dash);
      line.setAttribute('marker-end',marker);line.setAttribute('opacity',opacity);
      g.appendChild(line);

      // dist labels only on highlighted route
      if(highlightIdx===ri){
        const mx=(pa.x+pb.x)/2,my=(pa.y+pb.y)/2;
        const e=edges.find(e=>(e[0]===path[i]&&e[1]===path[i+1])||(e[0]===path[i+1]&&e[1]===path[i]));
        if(e){
          const dG=document.getElementById('dist-labels');
          const bg=document.createElementNS('http://www.w3.org/2000/svg','rect');
          bg.setAttribute('x',mx-13);bg.setAttribute('y',my-9);bg.setAttribute('width',26);bg.setAttribute('height',13);
          bg.setAttribute('rx','4');bg.setAttribute('fill','#fff');bg.setAttribute('stroke',col);bg.setAttribute('stroke-width','0.8');
          dG.appendChild(bg);
          const t=document.createElementNS('http://www.w3.org/2000/svg','text');
          t.setAttribute('x',mx);t.setAttribute('y',my+1);t.setAttribute('text-anchor','middle');
          t.setAttribute('font-size','8.5');t.setAttribute('fill',col);t.setAttribute('font-family','Inter,sans-serif');t.setAttribute('font-weight','600');
          t.textContent=e[2].toFixed(1)+'km';dG.appendChild(t);
        }
      }
    }
  });
}

function buildSidePanel(){
  const sp=document.getElementById('side-panel');
  sp.innerHTML='';
  activeRoutes.forEach((r,ri)=>{
    const col=routeColors[ri];
    const card=document.createElement('div');
    card.className='route-card'+(ri===highlightIdx?' active':'');
    card.style.setProperty('--rc',col);
    card.style.borderColor=ri===highlightIdx?col:'#ddd';

    const stepNames=r.path.map(id=>placeById(id).name);
    const preview=stepNames.length<=4?stepNames.join(' → '):stepNames[0]+' → '+stepNames[1]+' → ... → '+stepNames[stepNames.length-1];

    card.innerHTML=`
      <div class="rc-header">
        <div class="rc-badge" style="background:${col}"></div>
        <span class="rc-title">${modeLabels[ri]}</span>
        <span class="rc-dist" style="color:${col}">${r.dist.toFixed(1)} km</span>
      </div>
      <div class="rc-steps">${preview}</div>
      <div class="rc-mode">${modeIcons[ri]} ${r.path.length-1} segments · ${Math.round(r.dist/30*60)} min est.</div>
    `;
    card.onclick=()=>{highlightIdx=ri;buildSidePanel();drawRoutes();};
    sp.appendChild(card);
  });
}

function populateSelects(){
  const src=document.getElementById('src');
  const dst=document.getElementById('dst');
  places.forEach(p=>{
    const o1=document.createElement('option');o1.value=p.id;o1.textContent=p.name;src.appendChild(o1);
    const o2=document.createElement('option');o2.value=p.id;o2.textContent=p.name;dst.appendChild(o2);
  });
  src.value='isbt';dst.value='tapkeshwar';
}

function findRoutes(){
  const src=document.getElementById('src').value;
  const dst=document.getElementById('dst').value;
  if(src===dst){alert('Source and destination are the same!');return;}
  activeRoutes=kShortestPaths(src,dst,3);
  if(!activeRoutes.length){alert('No route found!');return;}
  highlightIdx=0;
  drawAll(src,dst);
  drawRoutes();
  buildSidePanel();
  document.getElementById('bottom-bar').style.display='flex';
}

function resetRoutes(){
  activeRoutes=[];highlightIdx=0;
  ['route1','route2','route3','dist-labels'].forEach(id=>document.getElementById(id).innerHTML='');
  document.getElementById('side-panel').innerHTML='';
  document.getElementById('bottom-bar').style.display='none';
  drawAll('','');
}

populateSelects();
drawAll('','');
</script>
</body></html>
